<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 480px;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
      font-weight: 600;
    }
    .subtitle {
      margin: 0 0 24px 0;
      font-size: 12px;
      color: #8c8c8c;
    }
    .setting {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .setting-label {
      flex: 1;
    }
    .setting-title {
      font-weight: 500;
      margin-bottom: 4px;
    }
    .setting-desc {
      font-size: 12px;
      color: #8c8c8c;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #d9d9d9;
      border-radius: 24px;
      transition: 0.3s;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle input:checked + .toggle-slider {
      background: #1677ff;
    }
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }
    .section-title {
      font-weight: 500;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .field-list {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 8px 0;
    }
    .field-item {
      display: flex;
      align-items: center;
      padding: 8px 16px;
    }
    .field-item:hover {
      background: #e8e8e8;
    }
    .field-name {
      flex: 1;
      font-size: 14px;
    }
    .saved {
      text-align: center;
      color: #52c41a;
      font-size: 14px;
      padding: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h2>字段选择</h2>
  <p class="subtitle">点击开关设置是否复制该字段</p>

  <div class="setting">
    <div class="setting-label">
      <div class="setting-title">包含表头</div>
      <div class="setting-desc">复制时是否包含列标题行</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="includeHeader">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="section">
    <div class="section-title">数据字段</div>
    <div id="fieldList" class="field-list"></div>
  </div>

  <div id="saved" class="saved">设置已保存</div>

  <script src="options.js"></script>
</body>
</html>
